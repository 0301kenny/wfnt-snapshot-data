name: snapshot

on:
  schedule:
    - cron: '37 9,11,13 * * 1-5'
  workflow_dispatch:
    inputs:
      datasets:
        description: 'Comma-separated dataset keys to run'
        required: false
        type: string
      force:
        description: 'Force overwrite and ignore hash skips'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run snapshot
        id: snapshot
        env:
          SNAPSHOT_DATASETS: ${{ inputs.datasets }}
          SNAPSHOT_FORCE: ${{ inputs.force }}
        run: node scripts/run.mjs

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "${{ steps.snapshot.outputs.commit_message }}"
          git pull --rebase
          git push
